[pytest]
# P0 后端测试配置
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 标记
markers =
    integration: 集成测试（使用 SQLite）
    unit: 单元测试
    slow: 慢速测试
    golden: Golden Case 测试
